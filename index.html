<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="19800">
<title>Modern Dashboard</title>
<!-- Google Fonts laden: Syne & Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<style>
  body {
    background-color: #f8f9fa;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    height: 100vh;
    overflow: hidden;
  }

  /* Container voor de klok, video en de tekst */
  .video-container {
    width: 100%;
    display: flex;
    flex-direction: column; 
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  /* Strakke, brede moderne klok */
  .clock {
    font-family: 'Syne', sans-serif; /* Modern, breed sans-serif font */
    font-size: 85px; 
    font-weight: 800; /* Extra dik */
    color: #111111; /* Diep, strak zwart */
    margin-bottom: 60px; /* Iets hoger geplaatst boven de video */
    letter-spacing: 12px; /* Veel ruimte tussen cijfers voor een breder effect */
    line-height: 1;
    transform: scaleX(1.1); /* Maakt de tekst nog eens 10% breder */
  }

  /* De video wrapper (1020px max-width) */
  .video-wrapper {
    width: 100%;
    max-width: 1020px; 
    aspect-ratio: 16 / 9;
    background-color: #000;
    border-radius: 12px; 
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.12);
  }

  .video-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Welkomsttekst onderaan */
  .welcome-text {
    margin-top: 40px; 
    text-align: center;
    font-family: 'Inter', sans-serif; /* Strakke moderne sans-serif */
    font-size: 24px; 
    color: #333333;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase; /* Zorgt voor een strakke, moderne uitstraling */
  }
</style>
</head>
<body>

<div class="video-container">
    <!-- Strakke, brede klok -->
    <div class="clock" id="clock">00:00</div>

    <div class="video-wrapper">
        <!-- YouTube video -->
        <iframe 
            src="https://www.youtube-nocookie.com/embed/videoseries?list=PLeZLvM17wCjE&autoplay=1&mute=1&loop=1&playlist=PLeZLvM17wCjE" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>
    
    <div class="welcome-text">
        Met vragen bent u altijd welkom bij een van onze collega's!
    </div>
</div>

<script>
  function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('clock').textContent = `${hours}:${minutes}`;
  }

  // Update de tijd direct en daarna elke seconde
  updateClock();
  setInterval(updateClock, 1000);
</script>

</body>
</html>
