<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="19800">
<title>Video Dashboard</title>
<style>
  body {
    background-color: #f9f9f9;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    height: 100vh;
    overflow: hidden;
  }

  /* Container voor de klok, video en de tekst */
  .video-container {
    width: 100%;
    display: flex;
    flex-direction: column; 
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  /* Grote digitale klok bovenaan */
  .clock {
    font-family: 'Verdana', sans-serif;
    font-size: 72px;
    font-weight: bold;
    color: #333;
    margin-bottom: 20px;
    letter-spacing: 2px;
  }

  /* De video wrapper (1020px max-width) */
  .video-wrapper {
    width: 100%;
    max-width: 1020px; 
    aspect-ratio: 16 / 9;
    background-color: #000;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  .video-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Welkomsttekst */
  .welcome-text {
    margin-top: 30px; 
    text-align: center;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.20); 
    font-family: 'Verdana', sans-serif;
    font-size: 29px;
    color: #524e4e;
    font-weight: bold;
    letter-spacing: -1px;
  }
</style>
</head>
<body>

<div class="video-container">
    <!-- Grote digitale klok -->
    <div class="clock" id="clock">00:00</div>

    <div class="video-wrapper">
        <!-- YouTube video -->
        <iframe 
            src="https://www.youtube-nocookie.com/embed/videoseries?list=PLeZLvM17wCjE&autoplay=1&mute=1&loop=1&playlist=PLeZLvM17wCjE" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>
    
    <div class="welcome-text">
        Met vragen bent u altijd welkom bij een van onze collega's!
    </div>
</div>

<script>
  function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('clock').textContent = `${hours}:${minutes}`;
  }

  // Update de tijd direct en daarna elke seconde
  updateClock();
  setInterval(updateClock, 1000);
</script>

</body>
</html>
