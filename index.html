<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="19800">
<title>Dashboard</title>

<!-- Added Garet font stylesheet for the new clock design -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.cdnfonts.com/css/garet" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">

<style>
  body {
    background-color: #f8f9fa;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    height: 100vh;
    overflow: hidden;
  }

  .video-container {
    width: 100%;
    display: flex;
    flex-direction: column; 
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  /* Klok: updated to match the Garet font, weight (850), line-height, and letter-spacing */
  .clock {
    font-family: 'Garet', sans-serif;
    font-size: 110px; 
    font-weight: 850;
    color: #524e4e; 
    letter-spacing: -2px; 
    line-height: 0.82;
    margin-top: -30px;
    margin-bottom: 25px;
    font-variant-numeric: tabular-nums; 
    
    text-shadow: 
      0 4px 12px rgba(0, 0, 0, 0.28),
      0 1px 2px rgba(0, 0, 0, 0.15);
  }

  .video-wrapper {
    width: 100%;
    max-width: 1020px; 
    aspect-ratio: 16 / 9;
    background-color: #000;
    border-radius: 12px; 
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.12);
  }

  .video-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Animatie voor het ademende effect */
  @keyframes breathe {
    0%, 100% {
      color: #333030;
    }
    50% {
      color: #9e9696;
    }
  }

  .welcome-text {
    margin-top: 35px; 
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 26px; 
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.5px;
    animation: breathe 4s ease-in-out infinite;
  }
</style>
</head>
<body>

<div class="video-container">
    <div class="clock" id="clock">00:00</div>

<div class="welcome-text">
        
    </div>

<div class="welcome-text">
        
    </div>
    
    <div class="video-wrapper">
        <iframe 
            src="https://www.youtube-nocookie.com/embed/videoseries?list=PLeZLvM17wCjE&autoplay=1&mute=1&loop=1&playlist=PLeZLvM17wCjE" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>
    
    <div class="welcome-text">
        Met vragen bent u altijd welkom bij een van onze collega's!
    </div>
</div>

<script>
  function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('clock').textContent = `${hours}:${minutes}`;
  }

  updateClock();
  setInterval(updateClock, 1000);
</script>

</body>
</html>
