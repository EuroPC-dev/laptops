<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="19800">
<title>Premium Video Dashboard</title>
<!-- Google Fonts laden: Playfair Display -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
  body {
    background-color: #fcfcfc; /* Iets zachter wit */
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    height: 100vh;
    overflow: hidden;
  }

  /* Container voor de klok, video en de tekst */
  .video-container {
    width: 100%;
    display: flex;
    flex-direction: column; 
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  /* Designer klok bovenaan */
  .clock {
    font-family: 'Playfair Display', serif; /* Serif font voor luxe uitstraling */
    font-size: 80px; /* Iets groter */
    font-weight: 400; /* Iets dunner is vaak chiquer dan bold */
    color: #2c3e50; /* Chic donkergrijs/blauw */
    margin-bottom: 50px; /* Meer ruimte onder de klok (staat hij optisch hoger) */
    letter-spacing: 4px; /* Ruime spatiëring tussen de cijfers */
    text-transform: uppercase;
    /* Subtiele text-shadow voor diepte */
    text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
  }

  /* De video wrapper (1020px max-width) */
  .video-wrapper {
    width: 100%;
    max-width: 1020px; 
    aspect-ratio: 16 / 9;
    background-color: #000;
    border-radius: 8px; /* Iets strakker dan 15px */
    overflow: hidden;
    /* Zachtere, grotere schaduw voor 'float' effect */
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    border: 1px solid rgba(0,0,0,0.05); /* Heel dun lijntje eromheen */
  }

  .video-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Welkomsttekst onderaan */
  .welcome-text {
    margin-top: 40px; 
    text-align: center;
    font-family: 'Playfair Display', serif; /* Zelfde font familie */
    font-size: 26px; /* Iets kleiner */
    color: #524e4e;
    font-weight: 400;
    font-style: italic; /* Schuingedrukt voor elegantie */
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="video-container">
    <!-- Designer digitale klok -->
    <div class="clock" id="clock">00:00</div>

    <div class="video-wrapper">
        <!-- YouTube video -->
        <iframe 
            src="https://www.youtube-nocookie.com/embed/videoseries?list=PLeZLvM17wCjE&autoplay=1&mute=1&loop=1&playlist=PLeZLvM17wCjE" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>
    
    <div class="welcome-text">
        Met vragen bent u altijd welkom bij een van onze collega's!
    </div>
</div>

<script>
  function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('clock').textContent = `${hours}:${minutes}`;
  }

  // Update de tijd direct en daarna elke seconde
  updateClock();
  setInterval(updateClock, 1000);
</script>

</body>
</html>
