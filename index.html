<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="19800">
<title>Video Dashboard</title>
<style>
  body {
    background-color: #f9f9f9;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    height: 100vh;
    overflow: hidden;
  }

  /* Container voor de video en de tekst */
  .video-container {
    width: 100%;
    display: flex;
    flex-direction: column; 
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  /* De video wrapper (1020px max-width) */
  .video-wrapper {
    width: 100%;
    max-width: 1020px; 
    aspect-ratio: 16 / 9;
    background-color: #000;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  .video-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Basis lay-out voor de welkomsttekst (afstand en uitlijning) */
  .welcome-text {
    margin-top: 40px; 
    text-align: center;
    letter-spacing: 0.5px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.20); 
  }
</style>
</head>
<body>

<div class="video-container">
    <div class="video-wrapper">
        <!-- Jouw losse YouTube video -->
        <iframe src="https://www.youtube-nocookie.com/embed/videoseries?list=PLeZLvM17wCjE&autoplay=1&mute=1&loop=1" 
                allow="autoplay; encrypted-media" allowfullscreen>
        </iframe>
    </div>
    
    <!-- Pas hieronder het lettertype, de grootte, de kleur en de dikte aan -->
    <div class="welcome-text" style="font-family: 'Verdana', sans-serif; font-size: 29px; color: #524e4e; font-weight: bold; letter-spacing: -1px;">
        Met vragen bent u altijd welkom bij een van onze collega's!
    </div>
</div>

</body>
</html>
